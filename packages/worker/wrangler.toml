name = "survibe"
main = "src/index.ts"
compatibility_date = "2026-05-21"
routes = [{ pattern = "survibe.net", custom_domain = true }]

[observability]
enabled = true

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "survibe"
database_id = "b1774660-a4bc-4fea-9ddf-c9cfe05d297d"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "GAME_COORDINATOR"
class_name = "GameCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameCoordinator"]

[vars]
APP_ENV = "development"
OPENAI_MODEL = "gpt-5.4-mini"

[secrets]
required = ["OPENAI_API_KEY"]
